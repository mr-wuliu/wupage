name: Build tagged release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: write

jobs:
  release:
    name: Build and publish Edge package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Verify release version
        shell: bash
        run: |
          set -euo pipefail
          tag_version="${GITHUB_REF_NAME#v}"
          package_version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"
          lock_version="$(node -p "JSON.parse(require('fs').readFileSync('package-lock.json', 'utf8')).version")"
          manifest_version="$(node -p "JSON.parse(require('fs').readFileSync('public/manifest.json', 'utf8')).version")"
          manifest_release_version="$(node -p "const manifest = JSON.parse(require('fs').readFileSync('public/manifest.json', 'utf8')); manifest.version_name || manifest.version")"

          if [[ "$GITHUB_REF_NAME" != v* || -z "$tag_version" ]]; then
            echo "Release tags must use the v<version> format, for example v0.1.0."
            exit 1
          fi

          if [[ "$tag_version" != "$package_version" ||
                "$tag_version" != "$lock_version" ||
                "$tag_version" != "$manifest_release_version" ]]; then
            echo "Version mismatch:"
            echo "  tag:          $tag_version"
            echo "  package:      $package_version"
            echo "  package-lock: $lock_version"
            echo "  manifest:     $manifest_version"
            echo "  version_name: $manifest_release_version"
            exit 1
          fi

          echo "RELEASE_VERSION=$tag_version" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Check types
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Verify content script bundle
        shell: bash
        run: |
          if head -n 1 dist/content.js | grep -q '^import'; then
            echo "dist/content.js contains a top-level import and cannot run as a classic MV3 content script."
            exit 1
          fi

      - name: Package Edge extension
        shell: bash
        run: |
          set -euo pipefail
          archive_name="wupage-${RELEASE_VERSION}-edge.zip"
          archive="release/$archive_name"
          mkdir -p release
          (cd dist && zip -r "../$archive" .)

          if ! unzip -Z1 "$archive" | grep -qx 'manifest.json'; then
            echo "The ZIP package must contain manifest.json at its root."
            exit 1
          fi

          (cd release && sha256sum "$archive_name" > "${archive_name}.sha256")

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: wupage-${{ github.ref_name }}-edge
          path: release/*
          if-no-files-found: error

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" release/* --clobber
            if [[ "$RELEASE_VERSION" == *-* ]]; then
              gh release edit "$GITHUB_REF_NAME" --prerelease
            fi
          else
            release_flags=()
            if [[ "$RELEASE_VERSION" == *-* ]]; then
              release_flags+=(--prerelease)
            fi
            gh release create "$GITHUB_REF_NAME" release/* \
              --verify-tag \
              --generate-notes \
              --title "WuPage $GITHUB_REF_NAME" \
              "${release_flags[@]}"
          fi

      - name: Trigger wupage-web sync
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          # Dispatch sync-web.yml on default branch with the release tag.
          # sync-web.yml reads release info via `gh release view` and updates
          # 6 hardcoded version references in wupage-web/index.html, then
          # commits + pushes (which fires wupage-web's deploy.yml).
          #
          # Why dispatch instead of `on: release: published`?
          # release.yml uses the default GITHUB_TOKEN to create the release,
          # so the release:published event actor = github-actions[bot].
          # GitHub's loop-prevention drops bot-actor events, so the release
          # trigger never fires downstream workflows. Explicit dispatch
          # bypasses that restriction.
          sleep 3  # brief pause so the release API reflects the new assets
          gh workflow run sync-web.yml \
            --ref main \
            -f tag="$GITHUB_REF_NAME"
          echo "Dispatched sync-web.yml with tag=$GITHUB_REF_NAME"
