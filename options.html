<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WuPage 设置</title>
    <script type="module" src="/src/options/index.ts"></script>
  </head>
  <body>
    <main class="settings">
      <header>
        <h1>WuPage 设置</h1>
        <p>配置翻译服务和页面翻译行为。</p>
      </header>

      <section>
        <h2>通用</h2>
        <div class="grid">
          <label>目标语言 <select id="targetLang"></select></label>
          <label>源语言 <input id="sourceLang" type="text" /></label>
          <label>分块大小 <input id="chunkSize" type="number" min="200" max="4000" /></label>
          <label>并发数 <input id="concurrency" type="number" min="1" max="8" /></label>
        </div>
        <label class="check"><input id="cacheEnabled" type="checkbox" /> 启用本地缓存</label>
        <label class="check"><input id="floatingBallEnabled" type="checkbox" /> 显示悬浮球</label>
      </section>

      <section>
        <h2>翻译服务</h2>
        <div class="provider-field">
          <span class="field-label">当前服务</span>
          <div class="provider-toolbar">
            <div id="providerPicker" class="provider-picker">
              <button id="providerTrigger" class="provider-trigger" type="button" aria-haspopup="listbox" aria-expanded="false">
                <span id="providerTriggerLabel" class="provider-trigger-label"></span>
                <span class="provider-chevron" aria-hidden="true"></span>
              </button>
              <div id="providerMenu" class="provider-menu" role="listbox" hidden></div>
            </div>
            <button id="addProvider" class="icon-button add-provider" type="button" title="添加自定义供应商" aria-label="添加自定义供应商">+</button>
          </div>
        </div>
        <div id="providerForm"></div>
      </section>

      <footer>
        <button id="save" type="button">保存</button>
        <button id="test" type="button" class="secondary">测试服务</button>
        <button id="restore" type="button" class="secondary">恢复默认设置</button>
        <p id="status" role="status"></p>
      </footer>
    </main>

    <dialog id="providerDialog" class="provider-dialog">
      <form id="providerDialogForm">
        <header class="dialog-header">
          <h2>添加自定义供应商</h2>
          <button id="cancelProvider" class="dialog-close" type="button" title="关闭" aria-label="关闭">×</button>
        </header>
        <label>显示名称 <input id="customProviderName" type="text" placeholder="例如：公司翻译服务" /></label>
        <label>供应商类型
          <select id="customProviderKind">
            <option value="http">HTTP</option>
            <option value="llm">LLM</option>
          </select>
        </label>
        <label id="customLlmFormatField" hidden>LLM 接口格式
          <select id="customLlmFormat">
            <option value="openai">OpenAI 兼容</option>
            <option value="anthropic">Anthropic 兼容</option>
          </select>
        </label>
        <div class="dialog-actions">
          <button type="submit">添加</button>
        </div>
      </form>
    </dialog>
  </body>
</html>
