<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WuPage Translator</title>
    <script type="module" src="/src/popup/index.ts"></script>
  </head>
  <body>
    <main class="popup">
      <header>
        <h1>WuPage</h1>
        <button id="openOptions" type="button" title="打开设置">设置</button>
      </header>
      <div class="language-field">
        <span class="field-label">翻译语言</span>
        <div class="language-pair">
          <label class="language-select">
            <span class="visually-hidden">源语言</span>
            <select id="sourceLang"></select>
            <span class="language-chevron" aria-hidden="true"></span>
          </label>
          <span class="language-direction" aria-hidden="true">→</span>
          <label class="language-select">
            <span class="visually-hidden">目标语言</span>
            <select id="targetLang"></select>
            <span class="language-chevron" aria-hidden="true"></span>
          </label>
        </div>
      </div>
      <label>
        翻译服务
        <select id="provider"></select>
      </label>
      <button id="paragraphMode" type="button" class="switch-row" aria-pressed="false">
        <span>段落模式</span>
        <span class="switch" aria-hidden="true"><span></span></span>
      </button>
      <button id="floatingBall" type="button" class="switch-row" aria-pressed="true">
        <span>悬浮球</span>
        <span class="switch" aria-hidden="true"><span></span></span>
      </button>
      <div class="actions">
        <button id="pageToggle" type="button">翻译全文</button>
      </div>
      <div class="actions">
        <button id="debug" type="button" class="secondary">Debug</button>
        <button id="clearCache" type="button" class="secondary">清除缓存</button>
      </div>
      <p id="status" role="status"></p>
      <button id="openGithub" type="button" class="footer-link">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 .5a12 12 0 0 0-3.79 23.39c.6.11.82-.26.82-.58v-2.04c-3.34.73-4.04-1.42-4.04-1.42-.55-1.39-1.34-1.76-1.34-1.76-1.09-.75.08-.73.08-.73 1.2.08 1.84 1.24 1.84 1.24 1.07 1.83 2.81 1.3 3.5.99.11-.78.42-1.3.76-1.6-2.67-.31-5.47-1.34-5.47-5.93 0-1.31.47-2.38 1.24-3.22-.13-.3-.54-1.53.12-3.18 0 0 1.01-.32 3.3 1.23a11.4 11.4 0 0 1 6.01 0c2.29-1.55 3.3-1.23 3.3-1.23.66 1.65.25 2.88.12 3.18.77.84 1.24 1.91 1.24 3.22 0 4.61-2.81 5.62-5.49 5.92.43.37.82 1.1.82 2.22v3.29c0 .32.22.7.83.58A12 12 0 0 0 12 .5Z" />
        </svg>
        <span>GitHub</span>
      </button>
    </main>
  </body>
</html>
